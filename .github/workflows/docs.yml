name: Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-docs:
    name: Build Docs
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - name: Build docs
        run: >-
          nix develop github:paolino/dev-assets?dir=mkdocs --quiet
          -c sh -lc 'mkdocs build --strict'
      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site
          if-no-files-found: error

  surge-preview:
    name: Surge Preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed'
    needs: build-docs
    runs-on: nixos
    env:
      SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      SURGE_DOMAIN: lambdasistemi-peer-proof-protocols-pr-${{ github.event.pull_request.number }}.surge.sh
    steps:
      - name: Preview disabled
        if: env.SURGE_TOKEN == ''
        run: echo "SURGE_TOKEN is not configured; skipping Surge preview." >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/download-artifact@v4
        if: env.SURGE_TOKEN != ''
        with:
          name: docs-site
          path: site
      - name: Publish preview
        if: env.SURGE_TOKEN != ''
        run: >-
          nix shell nixpkgs#nodePackages.surge --quiet
          -c sh -lc 'surge ./site "$SURGE_DOMAIN" --token "$SURGE_TOKEN"'
      - name: Preview summary
        if: env.SURGE_TOKEN != ''
        run: echo "Preview: https://$SURGE_DOMAIN" >> "$GITHUB_STEP_SUMMARY"

  surge-teardown:
    name: Remove Surge Preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed'
    runs-on: nixos
    env:
      SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      SURGE_DOMAIN: lambdasistemi-peer-proof-protocols-pr-${{ github.event.pull_request.number }}.surge.sh
    steps:
      - name: Preview teardown skipped
        if: env.SURGE_TOKEN == ''
        run: echo "SURGE_TOKEN is not configured; no Surge preview to remove." >> "$GITHUB_STEP_SUMMARY"
      - name: Remove preview
        if: env.SURGE_TOKEN != ''
        run: >-
          nix shell nixpkgs#nodePackages.surge --quiet
          -c sh -lc 'surge teardown "$SURGE_DOMAIN" --token "$SURGE_TOKEN" || true'

  pages-artifact:
    name: Package Pages Artifact
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: nixos
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pages-artifact
    runs-on: nixos
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
