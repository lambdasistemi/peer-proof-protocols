name: Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-docs:
    name: Build Docs
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - name: Build docs
        run: >-
          nix develop github:paolino/dev-assets?dir=mkdocs --quiet
          -c mkdocs build --strict
      - uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: site
          if-no-files-found: error

  shared-preview:
    name: Shared Preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed'
    needs: build-docs
    runs-on: nixos
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docs-site
          path: site
      - uses: paolino/dev-assets/static-preview@main
        with:
          path: site

  shared-preview-cleanup:
    name: Remove Shared Preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed'
    runs-on: nixos
    steps:
      - uses: paolino/dev-assets/static-preview@main
        with:
          mode: cleanup

  pages-artifact:
    name: Package Pages Artifact
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: nixos
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docs-site
          path: site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pages-artifact
    runs-on: nixos
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
