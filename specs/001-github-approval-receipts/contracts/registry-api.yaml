openapi: 3.1.0
info:
  title: Recovered GitHub Approval Receipts API
  version: github.pr_approval.v1
paths:
  /api/github/pull-requests/{owner}/{repo}/{pull_number}/approval-receipt:
    post:
      summary: Issue a GitHub pull request approval receipt
      parameters:
        - in: path
          name: owner
          required: true
          schema: { type: string }
        - in: path
          name: repo
          required: true
          schema: { type: string }
        - in: path
          name: pull_number
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                claim_mode:
                  type: string
                  enum: [pre_merge, post_merge, combined]
      responses:
        "200":
          description: Receipt issued
        "422":
          description: Receipt could not be issued because the claim was unsupported or inputs were incomplete
  /api/receipts/{receipt_id}:
    get:
      summary: Retrieve a previously issued receipt bundle
      parameters:
        - in: path
          name: receipt_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Receipt bundle
        "404":
          description: Receipt not found
  /api/verify/github-approval-receipt:
    post:
      summary: Verify a GitHub approval receipt bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./receipt-bundle.schema.json
      responses:
        "200":
          description: Verification result
        "400":
          description: Malformed receipt bundle
